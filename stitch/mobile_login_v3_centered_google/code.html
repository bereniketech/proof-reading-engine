<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editorial Intelligence - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3F51B5",
              "primary-container": "#E8EAF6",
              "on-primary": "#FFFFFF",
              "on-primary-container": "#1A237E",
              "secondary": "#5C6BC0",
              "secondary-container": "#E8EAF6",
              "on-secondary": "#FFFFFF",
              "on-secondary-container": "#283593",
              "tertiary": "#3949AB",
              "surface": "#F8FAFC",
              "on-surface": "#1E293B",
              "on-surface-variant": "#64748B",
              "outline": "#CBD5E1",
              "outline-variant": "#E2E8F0",
              "background": "#F8FAFC",
              "error": "#B00020",
              "surface-container-low": "#F1F5F9",
              "surface-container-lowest": "#FFFFFF",
              "surface-container-high": "#E2E8F0"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .syntactic-gradient {
            background: linear-gradient(135deg, #3F51B5 0%, #5C6BC0 100%);
        }
        .prism-blur {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Decorative Prism Elements -->
<div class="absolute -top-24 -right-24 w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -left-12 w-64 h-64 bg-secondary/10 rounded-full blur-3xl"></div>
<!-- Logo & Brand -->
<div class="mb-12 flex flex-col items-center text-center">
<div class="w-16 h-16 syntactic-gradient rounded-xl flex items-center justify-center mb-6 shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="edit_note">edit_note</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">
                Editorial Intelligence
            </h1>
<p class="text-on-surface-variant text-sm mt-3 max-w-[260px] font-medium">
                The Digital Curator for professional manuscripts.
            </p>
</div>
<!-- Login Card -->
<div class="w-full max-w-sm space-y-8">
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm border border-outline-variant/50">
<div class="space-y-6">
<!-- Headline -->
<div class="space-y-1">
<h2 class="font-headline font-bold text-2xl text-on-surface">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Sign in to your editorial workspace.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold tracking-wider uppercase text-on-surface-variant px-1" for="email">
                                Email Address
                            </label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all duration-200 outline-none" id="email" name="email" placeholder="editor@lexicon.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold tracking-wider uppercase text-on-surface-variant" for="password">
                                    Password
                                </label>
<a class="text-xs font-bold text-primary hover:text-secondary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-12 syntactic-gradient text-on-primary font-bold rounded-lg shadow-lg shadow-primary/25 hover:shadow-xl hover:opacity-95 active:scale-[0.98] transition-all duration-200 mt-4" type="submit">
                            Access Workspace
                        </button>
</form>
</div>
<!-- Alternative Auth -->
<div class="relative py-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase tracking-[0.2em] font-bold">
<span class="bg-surface-container-lowest px-4 text-on-surface-variant">or continue with</span>
</div>
</div>
<div class="grid flex justify-center w-full">
<button class="flex items-center justify-center h-12 bg-white border border-outline-variant rounded-lg text-on-surface text-sm font-bold hover:bg-surface-container-low hover:border-outline transition-all duration-200 px-8">
<img alt="Google" class="w-5 h-5 mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0XvbsoA_8TYwU-5BETi9XGgtHyK7KU1_SBRojuSTTFjmaNBoExribtSeo-7uLRqVmXwGjriHiecRnZ3UHdsoiR0YqgwDRQpBw69fZxBqhS2ruAteygl0v3_d8aNoyI3hoREUJd1xjYCB-foeRyOO1Bu3bv84EKKztIe2YWkBxqYZ306loHfXSaoQn2eseEWdZgVgMuTYtkPsjz0bAa1ANsS2pJcdWLdpJ_VMGPJu_R6VedF14bHWN24dLlseQpxS5s11CkJawYUY"/>
                        Google
                    </button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center text-sm text-on-surface-variant font-medium">
                New to the platform? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</main>
<!-- Visual Assurance Section -->
<div class="w-full bg-surface-container-low py-10 px-6 border-t border-outline-variant/30">
<div class="max-w-4xl mx-auto flex flex-wrap justify-center gap-8 md:gap-12 opacity-60">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary" data-icon="verified_user">verified_user</span>
<span class="font-headline font-bold text-[10px] tracking-widest uppercase">Academic Standards</span>
</div>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary" data-icon="history_edu">history_edu</span>
<span class="font-headline font-bold text-[10px] tracking-widest uppercase">AI Precision</span>
</div>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary" data-icon="auto_stories">auto_stories</span>
<span class="font-headline font-bold text-[10px] tracking-widest uppercase">Publishing Ready</span>
</div>
</div>
</div>
</body></html>
