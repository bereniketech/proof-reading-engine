services:
  - type: web
    name: proof-reading-engine-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: LANGUAGETOOL_API_URL
        sync: false
      - key: LANGUAGETOOL_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        sync: false
